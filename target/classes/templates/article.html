<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情 - 个人博客</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; }
        .navbar { background: #2c3e50; }
        .article-content { line-height: 1.8; font-size: 16px; }
        .article-content img { max-width: 100%; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">我的博客</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="/write">写文章</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-8">
                <div class="card">
                    <img id="cover" class="card-img-top" style="height: 300px; object-fit: cover;" src="" alt="cover">
                    <div class="card-body">
                        <h2 id="title" class="card-title"></h2>
                        <div class="text-muted mb-3">
                            <span id="author"></span> | 
                            <span id="category"></span> | 
                            <span id="date"></span>
                        </div>
                        <div id="content" class="article-content"></div>
                        <hr>
                        <div class="d-flex align-items-center">
                            <button class="btn btn-outline-danger me-3" onclick="toggleLike()">
                                ❤️ <span id="like-count">0</span>
                            </button>
                            <span class="text-muted">👁 <span id="view-count">0</span> 阅读</span>
                        </div>
                    </div>
                </div>

                <div class="card mt-4">
                    <div class="card-header">评论</div>
                    <div class="card-body">
                        <textarea id="comment" class="form-control mb-2" rows="3" placeholder="发表评论..."></textarea>
                        <button class="btn btn-primary btn-sm" onclick="submitComment()">提交评论</button>
                        <div id="comments" class="mt-3">
                            <!-- Comments will be loaded here -->
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">热门文章</div>
                    <ul class="list-group list-group-flush" id="popular-articles"></ul>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const articleId = new URLSearchParams(window.location.search).get('id') || 1;
        let liked = false;

        // Load article
        fetch(`/api/articles/${articleId}`)
            .then(res => res.json())
            .then(article => {
                document.getElementById('title').textContent = article.title;
                document.getElementById('content').innerHTML = article.content;
                document.getElementById('author').textContent = article.authorNickname;
                document.getElementById('category').textContent = article.categoryName || '未分类';
                document.getElementById('date').textContent = new Date(article.createdAt).toLocaleDateString();
                document.getElementById('like-count').textContent = article.likeCount;
                document.getElementById('view-count').textContent = article.viewCount;
                if (article.coverImage) {
                    document.getElementById('cover').src = article.coverImage;
                }
                loadComments();
            });

        // Load comments
        function loadComments() {
            fetch(`/api/comments/article/${articleId}`)
                .then(res => res.json())
                .then(comments => {
                    const container = document.getElementById('comments');
                    container.innerHTML = comments.map(c => `
                        <div class="border-bottom py-2">
                            <strong>${c.nickname}</strong>
                            <span class="text-muted small">${new Date(c.createdAt).toLocaleString()}</span>
                            <p class="mb-0">${c.content}</p>
                        </div>
                    `).join('');
                });
        }

        // Submit comment
        function submitComment() {
            const content = document.getElementById('comment').value;
            if (!content) return alert('请输入评论内容');
            
            fetch(`/api/comments?userId=1`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ articleId: parseInt(articleId), content })
            })
            .then(res => res.json())
            .then(() => {
                document.getElementById('comment').value = '';
                loadComments();
            });
        }

        // Toggle like
        function toggleLike() {
            const url = liked ? `/api/likes/${articleId}?userId=1` : `/api/likes/${articleId}?userId=1`;
            fetch(url, { method: liked ? 'DELETE' : 'POST' })
                .then(res => res.json())
                .then(() => {
                    liked = !liked;
                    const btn = document.querySelector('.btn-outline-danger');
                    btn.classList.toggle('btn-outline-danger');
                    btn.classList.toggle('btn-danger');
                    document.getElementById('like-count').textContent = 
                        parseInt(document.getElementById('like-count').textContent) + (liked ? 1 : -1);
                });
        }

        // Load popular articles
        fetch('/api/articles/popular?limit=5')
            .then(res => res.json())
            .then(articles => {
                const container = document.getElementById('popular-articles');
                articles.forEach((article, i) => {
                    container.innerHTML += `<li class="list-group-item"><a href="/article?id=${article.id}">${article.title}</a></li>`;
                });
            });
    </script>
</body>
</html>
