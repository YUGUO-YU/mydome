<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - 个人博客</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/theme.css}" rel="stylesheet">
    <style>
        .hero-section {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 50%, #1d4ed8 100%);
            padding: 3rem 0;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }
        .hero-section::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            top: -25%;
            left: -25%;
        }
        .hero-content {
            position: relative;
            z-index: 1;
        }
        .hero-title {
            color: white;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }
        .hero-subtitle {
            color: rgba(255,255,255,0.85);
            font-size: 1.1rem;
        }
        .stat-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 1rem;
            padding: 1.5rem;
            text-align: center;
            color: white;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 700;
        }
        .stat-label {
            font-size: 0.875rem;
            opacity: 0.85;
        }
        .popular-item {
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border-color);
            transition: var(--transition);
        }
        .popular-item:last-child {
            border-bottom: none;
        }
        .popular-item:hover {
            padding-left: 0.5rem;
        }
        .popular-item a {
            color: var(--text-primary);
            font-weight: 500;
        }
        .popular-item:hover a {
            color: var(--primary-color);
        }
        .popular-rank {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            margin-right: 0.75rem;
        }
        .popular-rank.top3 {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }
        .category-chip {
            display: inline-block;
            padding: 0.35rem 0.85rem;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
            transition: var(--transition);
        }
        .category-chip:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 1.25rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--primary-color);
            display: inline-block;
        }
        .article-stats {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .article-stats span {
            margin-right: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-pencil-square me-2"></i>我的博客
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="nav-items">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house-door me-1"></i>首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="/categories"><i class="bi bi-folder me-1"></i>分类</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about"><i class="bi bi-person me-1"></i>关于</a></li>
                    <li class="nav-item" id="nav-login"><a class="nav-link" href="/login"><i class="bi bi-box-arrow-in-right me-1"></i>登录</a></li>
                    <li class="nav-item" id="nav-register"><a class="nav-link" href="/register"><i class="bi bi-person-plus me-1"></i>注册</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero 区域 -->
    <div class="hero-section">
        <div class="container hero-content">
            <div class="row align-items-center">
                <div class="col-lg-8">
                    <h1 class="hero-title">欢迎来到我的博客</h1>
                    <p class="hero-subtitle">分享技术，记录生活，探索世界</p>
                </div>
                <div class="col-lg-4">
                    <div class="row g-3">
                        <div class="col-4">
                            <div class="stat-card">
                                <div class="stat-number" id="stat-articles">0</div>
                                <div class="stat-label">文章</div>
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="stat-card">
                                <div class="stat-number" id="stat-categories">0</div>
                                <div class="stat-label">分类</div>
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="stat-card">
                                <div class="stat-number" id="stat-comments">0</div>
                                <div class="stat-label">评论</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 主内容 -->
    <div class="container pb-5">
        <div class="row">
            <!-- 左侧文章列表 -->
            <div class="col-lg-8">
                <h4 class="section-title"><i class="bi bi-newspaper me-2"></i>最新文章</h4>
                <div class="row" id="articles">
                    <!-- 文章卡片 -->
                </div>
            </div>

            <!-- 右侧边栏 -->
            <div class="col-lg-4">
                <!-- 热门文章 -->
                <div class="card mb-4">
                    <div class="card-header">
                        <i class="bi bi-fire me-2"></i>热门文章
                    </div>
                    <div class="card-body p-0">
                        <div class="list-group list-group-flush" id="popular-articles">
                            <!-- 热门文章 -->
                        </div>
                    </div>
                </div>

                <!-- 分类 -->
                <div class="card mb-4">
                    <div class="card-header">
                        <i class="bi bi-folder me-2"></i>文章分类
                    </div>
                    <div class="card-body" id="categories">
                        <!-- 分类标签 -->
                    </div>
                </div>

                <!-- 关于 -->
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-info-circle me-2"></i>关于博主
                    </div>
                    <div class="card-body">
                        <p class="text-muted mb-2">热爱技术，喜欢探索新事物。这里记录我的学习心得和生活感悟。</p>
                        <a href="/about" class="btn btn-outline-primary btn-sm">了解更多</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6 text-center text-md-start mb-3 mb-md-0">
                    <p class="mb-0">&copy; 2024 我的博客. All rights reserved.</p>
                </div>
                <div class="col-md-6 text-center text-md-end">
                    <a href="#" class="text-white-50 me-3"><i class="bi bi-github"></i></a>
                    <a href="#" class="text-white-50 me-3"><i class="bi bi-twitter"></i></a>
                    <a href="#" class="text-white-50"><i class="bi bi-envelope"></i></a>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const token = localStorage.getItem('token');
        
        // 更新导航栏
        if (token) {
            const nickname = localStorage.getItem('nickname');
            document.getElementById('nav-items').innerHTML = `
                <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house-door me-1"></i>首页</a></li>
                <li class="nav-item"><a class="nav-link" href="/categories"><i class="bi bi-folder me-1"></i>分类</a></li>
                <li class="nav-item"><a class="nav-link" href="/about"><i class="bi bi-person me-1"></i>关于</a></li>
                <li class="nav-item"><a class="nav-link" href="/write"><i class="bi bi-plus-circle me-1"></i>写文章</a></li>
                <li class="nav-item"><a class="nav-link" href="/profile"><i class="bi bi-person-circle me-1"></i>${nickname}</a></li>
                <li class="nav-item"><a class="nav-link" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>退出</a></li>
            `;
        }

        // 加载文章
        fetch('/api/articles')
            .then(res => res.json())
            .then(articles => {
                const container = document.getElementById('articles');
                if (articles.length === 0) {
                    container.innerHTML = `
                        <div class="col-12 empty-state">
                            <i class="bi bi-newspaper"></i>
                            <h5>暂无文章</h5>
                            <p>还没有发布任何文章</p>
                        </div>
                    `;
                    return;
                }
                container.innerHTML = articles.map(article => `
                    <div class="col-md-6 mb-4 fade-in">
                        <div class="card article-card h-100">
                            <div class="overflow-hidden">
                                <img src="${article.coverImage || 'https://picsum.photos/seed/' + article.id + '/400/200'}" class="card-img-top" alt="cover">
                            </div>
                            <div class="card-body">
                                <h5 class="card-title">${article.title}</h5>
                                <p class="card-text text-muted">${article.summary || ''}</p>
                                <div class="article-stats">
                                    <span><i class="bi bi-eye"></i> ${article.viewCount || 0}</span>
                                    <span><i class="bi bi-heart"></i> ${article.likeCount || 0}</span>
                                    <span><i class="bi bi-chat"></i> ${article.commentCount || 0}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            });

        // 加载热门文章
        fetch('/api/articles/popular?limit=5')
            .then(res => res.json())
            .then(articles => {
                const container = document.getElementById('popular-articles');
                container.innerHTML = articles.map((article, i) => `
                    <div class="popular-item">
                        <a href="/article?id=${article.id}">
                            <span class="popular-rank ${i < 3 ? 'top3' : ''}">${i + 1}</span>
                            ${article.title}
                        </a>
                    </div>
                `).join('');
            });

        // 加载分类
        fetch('/api/categories')
            .then(res => res.json())
            .then(categories => {
                const container = document.getElementById('categories');
                container.innerHTML = categories.map(cat => `
                    <a href="/categories?cat=${cat.id}" class="category-chip">${cat.name}</a>
                `).join('');
            });

        // 加载统计数据
        fetch('/api/articles?size=1')
            .then(res => res.json())
            .then(data => {
                document.getElementById('stat-articles').textContent = data.totalElements || 0;
            });
        
        fetch('/api/categories')
            .then(res => res.json())
            .then(data => {
                document.getElementById('stat-categories').textContent = data.length || 0;
            });

        function logout() {
            localStorage.clear();
            window.location.href = '/login';
        }
    </script>
</body>
</html>
