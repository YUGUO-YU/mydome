<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - 个人博客</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; }
        .navbar { background: #2c3e50; }
        .article-card { transition: transform 0.2s; }
        .article-card:hover { transform: translateY(-5px); }
        .article-cover { height: 180px; object-fit: cover; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">我的博客</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="/categories">分类</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about">关于</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-8">
                <h4 class="mb-3">最新文章</h4>
                <div class="row" id="articles">
                    <!-- Articles will be loaded here -->
                </div>
            </div>
            <div class="col-md-4">
                <div class="card mb-4">
                    <div class="card-header">热门文章</div>
                    <ul class="list-group list-group-flush" id="popular-articles">
                        <!-- Popular articles -->
                    </ul>
                </div>
                <div class="card">
                    <div class="card-header">分类</div>
                    <ul class="list-group list-group-flush" id="categories">
                        <!-- Categories -->
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <p class="mb-0">© 2024 个人博客. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Load articles
        fetch('/api/articles')
            .then(res => res.json())
            .then(articles => {
                const container = document.getElementById('articles');
                articles.forEach(article => {
                    container.innerHTML += `
                        <div class="col-md-6 mb-4">
                            <div class="card article-card h-100">
                                <img src="${article.coverImage || 'https://picsum.photos/400/200'}" class="card-img-top article-cover" alt="cover">
                                <div class="card-body">
                                    <h5 class="card-title">${article.title}</h5>
                                    <p class="card-text text-muted">${article.summary || ''}</p>
                                    <div class="d-flex justify-content-between text-muted small">
                                        <span>👁 ${article.viewCount}</span>
                                        <span>❤️ ${article.likeCount}</span>
                                        <span>💬 ${article.commentCount}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
            });

        // Load popular articles
        fetch('/api/articles/popular?limit=5')
            .then(res => res.json())
            .then(articles => {
                const container = document.getElementById('popular-articles');
                articles.forEach((article, i) => {
                    container.innerHTML += `<li class="list-group-item">${i+1}. ${article.title}</li>`;
                });
            });

        // Load categories
        fetch('/api/categories')
            .then(res => res.json())
            .then(categories => {
                const container = document.getElementById('categories');
                categories.forEach(cat => {
                    container.innerHTML += `<li class="list-group-item">${cat.name}</li>`;
                });
            });
    </script>
</body>
</html>
