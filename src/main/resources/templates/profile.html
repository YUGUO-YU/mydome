<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 个人博客</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/theme.css}" rel="stylesheet">
    <style>
        .profile-header {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            padding: 3rem 0;
            margin-bottom: -3rem;
        }
        
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: var(--shadow-lg);
            object-fit: cover;
        }
        
        .profile-card {
            border-radius: var(--radius-xl);
            overflow: hidden;
        }
        
        .sidebar-menu {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            padding: 0.5rem;
            box-shadow: var(--shadow-sm);
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.875rem 1rem;
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            font-size: 0.95rem;
        }
        
        .menu-item:hover {
            background: var(--bg-color);
            color: var(--primary-color);
        }
        
        .menu-item.active {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
        }
        
        .menu-item i {
            font-size: 1.1rem;
        }
        
        .tab-content {
            background: white;
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
        }
        
        .info-item {
            padding: 1rem 0;
            border-bottom: 1px solid var(--border-color);
        }
        
        .info-item:last-child {
            border-bottom: none;
        }
        
        .info-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 0.25rem;
        }
        
        .info-value {
            color: var(--text-primary);
            font-weight: 500;
        }
        
        .article-item {
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            margin-bottom: 1rem;
            transition: var(--transition);
        }
        
        .article-item:hover {
            border-color: var(--primary-color);
            box-shadow: var(--shadow-sm);
        }
        
        .article-title {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
        
        .article-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        
        .stat-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.5rem;
            background: var(--bg-color);
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            margin-right: 0.75rem;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="bi bi-pencil-square me-2"></i>我的博客</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="/write">写文章</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 头部 -->
    <div class="profile-header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-3 text-center">
                    <img src="" class="profile-avatar" id="avatar" alt="头像">
                </div>
                <div class="col-md-9 text-white">
                    <h2 id="nickname" class="mb-1">用户昵称</h2>
                    <p id="username" class="opacity-75 mb-0">@username</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 内容 -->
    <div class="container py-4">
        <div class="row">
            <!-- 左侧菜单 -->
            <div class="col-md-3">
                <div class="sidebar-menu">
                    <button class="menu-item active" onclick="showTab('profile')">
                        <i class="bi bi-person"></i> 个人资料
                    </button>
                    <button class="menu-item" onclick="showTab('password')">
                        <i class="bi bi-key"></i> 修改密码
                    </button>
                    <button class="menu-item" onclick="showTab('articles')">
                        <i class="bi bi-file-text"></i> 我的文章
                    </button>
                    <button class="menu-item" onclick="logout()">
                        <i class="bi bi-box-arrow-right"></i> 退出登录
                    </button>
                </div>
            </div>
            
            <!-- 右侧内容 -->
            <div class="col-md-9">
                <!-- 个人资料 -->
                <div id="tab-profile" class="tab-content">
                    <h4 class="mb-4"><i class="bi bi-person me-2"></i>个人资料</h4>
                    <form id="profile-form">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">头像 URL</label>
                                    <input type="text" class="form-control" id="avatarUrl" placeholder="https://...">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">昵称</label>
                                    <input type="text" class="form-control" id="profileNickname">
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">邮箱</label>
                            <input type="email" class="form-control" id="profileEmail">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">个人简介</label>
                            <textarea class="form-control" id="profileBio" rows="3" placeholder="介绍一下自己..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i> 保存修改
                        </button>
                    </form>
                </div>
                
                <!-- 修改密码 -->
                <div id="tab-password" class="tab-content d-none">
                    <h4 class="mb-4"><i class="bi bi-key me-2"></i>修改密码</h4>
                    <form id="password-form">
                        <div class="mb-3">
                            <label class="form-label">当前密码</label>
                            <input type="password" class="form-control" id="oldPassword" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">新密码</label>
                            <input type="password" class="form-control" id="newPassword" required minlength="6">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">确认新密码</label>
                            <input type="password" class="form-control" id="confirmPassword" required>
                        </div>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i> 修改密码
                        </button>
                    </form>
                </div>
                
                <!-- 我的文章 -->
                <div id="tab-articles" class="tab-content d-none">
                    <h4 class="mb-4"><i class="bi bi-file-text me-2"></i>我的文章</h4>
                    <div id="my-articles">
                        <div class="text-center text-muted py-4">加载中...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const token = localStorage.getItem('token');
        const userId = localStorage.getItem('userId');
        
        if (!token) window.location.href = '/login';
        
        // 加载用户信息
        fetch('/api/auth/current', {
            headers: {'Authorization': 'Bearer ' + token}
        })
        .then(res => res.json())
        .then(user => {
            document.getElementById('nickname').textContent = user.nickname;
            document.getElementById('username').textContent = '@' + user.username;
            document.getElementById('avatar').src = user.avatar || 'https://api.dicebear.com/7.x/initials/svg?seed=' + user.nickname;
            document.getElementById('avatarUrl').value = user.avatar || '';
            document.getElementById('profileNickname').value = user.nickname;
            document.getElementById('profileEmail').value = user.email || '';
            document.getElementById('profileBio').value = user.bio || '';
        })
        .catch(() => logout());
        
        // 切换标签
        function showTab(tab) {
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('d-none'));
            document.getElementById('tab-' + tab).classList.remove('d-none');
            
            if (tab === 'articles') loadMyArticles();
        }
        
        // 加载我的文章
        function loadMyArticles() {
            fetch('/api/users/articles?userId=' + userId, {
                headers: {'Authorization': 'Bearer ' + token}
            })
            .then(res => res.json())
            .then(articles => {
                const container = document.getElementById('my-articles');
                if (articles.length === 0) {
                    container.innerHTML = '<div class="empty-state"><i class="bi bi-newspaper"></i><h5>暂无文章</h5><p>开始写你的第一篇文章吧</p><a href="/write" class="btn btn-primary">写文章</a></div>';
                    return;
                }
                container.innerHTML = articles.map(a => `
                    <div class="article-item">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <a href="/article?id=${a.id}" class="article-title">${a.title}</a>
                                <div class="article-meta mt-2">
                                    <span class="stat-badge"><i class="bi bi-eye"></i> ${a.viewCount}</span>
                                    <span class="stat-badge"><i class="bi bi-heart"></i> ${a.likeCount}</span>
                                    <span class="stat-badge"><i class="bi bi-chat"></i> ${a.commentCount}</span>
                                </div>
                            </div>
                            <span class="badge ${a.status === 'PUBLISHED' ? 'bg-success' : 'bg-secondary'}">${a.status === 'PUBLISHED' ? '已发布' : '草稿'}</span>
                        </div>
                    </div>
                `).join('');
            });
        }
        
        // 保存资料
        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                nickname: document.getElementById('profileNickname').value,
                email: document.getElementById('profileEmail').value,
                avatar: document.getElementById('avatarUrl').value,
                bio: document.getElementById('profileBio').value
            };
            
            const res = await fetch('/api/users/profile', {
                method: 'PUT',
                headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token},
                body: JSON.stringify(data)
            });
            
            if (res.ok) {
                alert('保存成功');
                localStorage.setItem('nickname', data.nickname);
                location.reload();
            } else {
                alert('保存失败');
            }
        });
        
        // 修改密码
        document.getElementById('password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPwd = document.getElementById('newPassword').value;
            const confirmPwd = document.getElementById('confirmPassword').value;
            
            if (newPwd !== confirmPwd) return alert('两次密码不一致');
            
            const res = await fetch('/api/users/password', {
                method: 'PUT',
                headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token},
                body: JSON.stringify({
                    oldPassword: document.getElementById('oldPassword').value,
                    newPassword: newPwd
                })
            });
            
            if (res.ok) {
                alert('密码修改成功，请重新登录');
                logout();
            } else {
                alert('修改失败，请检查当前密码');
            }
        });
        
        function logout() {
            localStorage.clear();
            window.location.href = '/login';
        }
    </script>
</body>
</html>
