<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情 - 个人博客</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/theme.css}" rel="stylesheet">
    <style>
        .article-header {
            position: relative;
            margin-bottom: 2rem;
        }
        .article-cover {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
        }
        .article-title {
            font-size: 2.25rem;
            font-weight: 800;
            color: var(--text-primary);
            margin: 1.5rem 0 1rem;
            line-height: 1.3;
        }
        .article-meta {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 1.5rem;
        }
        .article-meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .article-meta i {
            color: var(--primary-color);
        }
        .article-actions {
            display: flex;
            gap: 0.75rem;
            padding: 1rem;
            background: var(--bg-color);
            border-radius: var(--radius-lg);
            margin: 1.5rem 0;
        }
        .action-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            font-weight: 500;
            transition: var(--transition);
            border: none;
            cursor: pointer;
        }
        .action-btn.like {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger-color);
        }
        .action-btn.like:hover, .action-btn.like.active {
            background: var(--danger-color);
            color: white;
        }
        .action-btn.share {
            background: rgba(59, 130, 246, 0.1);
            color: var(--primary-color);
        }
        .action-btn.bookmark {
            background: rgba(245, 158, 11, 0.1);
            color: var(--accent-color);
        }
        .toc {
            background: var(--bg-color);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            margin-bottom: 1.5rem;
        }
        .toc-title {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
        }
        .toc-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .toc-list li {
            padding: 0.35rem 0;
        }
        .toc-list a {
            color: var(--text-secondary);
            font-size: 0.9rem;
            transition: var(--transition);
        }
        .toc-list a:hover {
            color: var(--primary-color);
            padding-left: 0.25rem;
        }
        /* 评论区域 */
        .comment-section {
            margin-top: 3rem;
        }
        .comment-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--primary-color);
        }
        .comment-count {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        .comment-form {
            background: var(--bg-color);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .comment-form textarea {
            border: none;
            background: transparent;
            resize: none;
            font-size: 1rem;
        }
        .comment-form textarea:focus {
            box-shadow: none;
        }
        .comment-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .comment-item {
            display: flex;
            gap: 1rem;
            padding: 1.25rem 0;
            border-bottom: 1px solid var(--border-color);
        }
        .comment-avatar {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-full);
            object-fit: cover;
            flex-shrink: 0;
        }
        .comment-body {
            flex: 1;
        }
        .comment-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }
        .comment-author {
            font-weight: 600;
            color: var(--text-primary);
        }
        .comment-time {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .comment-content {
            color: var(--text-secondary);
            line-height: 1.6;
        }
        .comment-actions {
            margin-top: 0.75rem;
        }
        .comment-action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.85rem;
            padding: 0;
            margin-right: 1rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .comment-action-btn:hover {
            color: var(--primary-color);
        }
        /* 相关文章 */
        .related-articles {
            margin-top: 3rem;
        }
        .related-card {
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: var(--transition);
        }
        .related-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }
        .related-card img {
            height: 140px;
            object-fit: cover;
        }
        .related-card-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="bi bi-pencil-square me-2"></i>我的博客</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto" id="nav-items">
                    <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <div class="container py-5">
        <div class="row">
            <!-- 左侧文章内容 -->
            <div class="col-lg-9">
                <article class="article-detail">
                    <!-- 封面图 -->
                    <img id="cover" class="article-cover" src="" alt="cover">
                    
                    <!-- 标题和元信息 -->
                    <h1 id="title" class="article-title"></h1>
                    
                    <div class="article-meta">
                        <div class="article-meta-item">
                            <i class="bi bi-person-circle"></i>
                            <span id="author"></span>
                        </div>
                        <div class="article-meta-item">
                            <i class="bi bi-folder"></i>
                            <span id="category"></span>
                        </div>
                        <div class="article-meta-item">
                            <i class="bi bi-calendar3"></i>
                            <span id="date"></span>
                        </div>
                        <div class="article-meta-item">
                            <i class="bi bi-eye"></i>
                            <span id="view-count"></span> 阅读
                        </div>
                    </div>
                    
                    <!-- 操作按钮 -->
                    <div class="article-actions">
                        <button class="action-btn like" onclick="toggleLike()">
                            <i class="bi bi-heart-fill"></i> <span id="like-count">0</span>
                        </button>
                        <button class="action-btn share" onclick="shareArticle()">
                            <i class="bi bi-share"></i> 分享
                        </button>
                    </div>
                    
                    <!-- 文章内容 -->
                    <div id="content" class="article-content"></div>
                </article>
                
                <!-- 评论区 -->
                <div class="comment-section">
                    <div class="comment-header">
                        <h4 class="comment-count"><i class="bi bi-chat-left-text me-2"></i>评论 (<span id="comment-total">0</span>)</h4>
                    </div>
                    
                    <!-- 登录提示 -->
                    <div id="login-prompt" class="alert alert-info d-flex align-items-center">
                        <i class="bi bi-info-circle me-2"></i>
                        <a href="/login">登录</a> 后发表评论
                    </div>
                    
                    <!-- 评论表单 -->
                    <div class="comment-form" id="comment-form" style="display: none;">
                        <textarea class="form-control" id="comment" rows="4" placeholder="写下你的评论..."></textarea>
                        <div class="d-flex justify-content-end mt-3">
                            <button class="btn btn-primary" onclick="submitComment()">
                                <i class="bi bi-send me-1"></i> 发表评论
                            </button>
                        </div>
                    </div>
                    
                    <!-- 评论列表 -->
                    <ul class="comment-list" id="comments">
                        <!-- 评论 -->
                    </ul>
                </div>
            </div>
            
            <!-- 右侧边栏 -->
            <div class="col-lg-3">
                <!-- 目录 -->
                <div class="card mb-4" id="toc-card">
                    <div class="card-header">
                        <i class="bi bi-list-ol me-2"></i>文章目录
                    </div>
                    <div class="card-body">
                        <div class="toc" id="toc">
                            <!-- 目录 -->
                        </div>
                    </div>
                </div>
                
                <!-- 热门文章 -->
                <div class="card mb-4">
                    <div class="card-header">
                        <i class="bi bi-fire me-2"></i>热门文章
                    </div>
                    <div class="card-body p-0">
                        <div class="list-group list-group-flush" id="popular-articles"></div>
                    </div>
                </div>
                
                <!-- 返回顶部 -->
                <div class="text-center">
                    <a href="/" class="btn btn-outline-primary">
                        <i class="bi bi-arrow-left me-1"></i> 返回首页
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-0">&copy; 2024 我的博客. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const articleId = new URLSearchParams(window.location.search).get('id') || 1;
        const token = localStorage.getItem('token');
        const userId = localStorage.getItem('userId');
        let liked = false;

        // 更新导航
        if (token) {
            const nickname = localStorage.getItem('nickname');
            document.getElementById('nav-items').innerHTML = `
                <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house-door me-1"></i>首页</a></li>
                <li class="nav-item"><a class="nav-link" href="/write"><i class="bi bi-plus-circle me-1"></i>写文章</a></li>
                <li class="nav-item"><a class="nav-link" href="/profile">${nickname}</a></li>
                <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">退出</a></li>
            `;
            document.getElementById('login-prompt').style.display = 'none';
            document.getElementById('comment-form').style.display = 'block';
        }

        // 加载文章
        fetch(`/api/articles/${articleId}`)
            .then(res => res.json())
            .then(article => {
                document.title = article.title + ' - 我的博客';
                if (article.coverImage) {
                    document.getElementById('cover').src = article.coverImage;
                    document.getElementById('cover').style.display = 'block';
                } else {
                    document.getElementById('cover').style.display = 'none';
                }
                document.getElementById('title').textContent = article.title;
                document.getElementById('content').innerHTML = article.content.replace(/\n/g, '<br>');
                document.getElementById('author').textContent = article.authorNickname;
                document.getElementById('category').textContent = article.categoryName || '未分类';
                document.getElementById('date').textContent = new Date(article.createdAt).toLocaleDateString();
                document.getElementById('view-count').textContent = article.viewCount;
                document.getElementById('like-count').textContent = article.likeCount;
                document.getElementById('comment-total').textContent = article.commentCount;
                
                loadComments();
            });

        // 加载评论
        function loadComments() {
            fetch(`/api/comments/article/${articleId}`)
                .then(res => res.json())
                .then(comments => {
                    const container = document.getElementById('comments');
                    if (comments.length === 0) {
                        container.innerHTML = '<li class="text-center text-muted py-4">暂无评论，快来抢沙发吧~</li>';
                        return;
                    }
                    container.innerHTML = comments.map(c => `
                        <li class="comment-item slide-up">
                            <img src="${c.avatar || 'https://api.dicebear.com/7.x/initials/svg?seed=' + c.nickname}" class="comment-avatar" alt="avatar">
                            <div class="comment-body">
                                <div class="comment-header">
                                    <span class="comment-author">${c.nickname}</span>
                                    <span class="comment-time">${new Date(c.createdAt).toLocaleString()}</span>
                                </div>
                                <div class="comment-content">${c.content}</div>
                            </div>
                        </li>
                    `).join('');
                });
        }

        // 提交评论
        function submitComment() {
            const content = document.getElementById('comment').value;
            if (!content) return alert('请输入评论内容');
            if (!token) return window.location.href = '/login';
            
            fetch(`/api/comments`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({ articleId: parseInt(articleId), content })
            })
            .then(res => res.json())
            .then(() => {
                document.getElementById('comment').value = '';
                loadComments();
                document.getElementById('comment-total').textContent = 
                    parseInt(document.getElementById('comment-total').textContent) + 1;
            });
        }

        // 点赞
        function toggleLike() {
            if (!token) return window.location.href = '/login';
            
            const url = liked ? `/api/likes/${articleId}?userId=${userId}` : `/api/likes/${articleId}?userId=${userId}`;
            fetch(url, { 
                method: liked ? 'DELETE' : 'POST',
                headers: {'Authorization': 'Bearer ' + token}
            })
            .then(res => res.json())
            .then(() => {
                liked = !liked;
                const btn = document.querySelector('.action-btn.like');
                btn.classList.toggle('active');
                document.getElementById('like-count').textContent = 
                    parseInt(document.getElementById('like-count').textContent) + (liked ? 1 : -1);
            });
        }

        // 分享
        function shareArticle() {
            if (navigator.share) {
                navigator.share({
                    title: document.getElementById('title').textContent,
                    url: window.location.href
                });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert('链接已复制到剪贴板');
            }
        }

        // 加载热门文章
        fetch('/api/articles/popular?limit=5')
            .then(res => res.json())
            .then(articles => {
                const container = document.getElementById('popular-articles');
                container.innerHTML = articles.map(article => `
                    <a href="/article?id=${article.id}" class="list-group-item list-group-item-action">
                        ${article.title}
                    </a>
                `).join('');
            });

        function logout() {
            localStorage.clear();
            window.location.href = '/login';
        }
    </script>
</body>
</html>
