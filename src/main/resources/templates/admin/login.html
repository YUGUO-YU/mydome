<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 个人博客</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .form-control:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 0.2rem rgba(79, 70, 229, 0.25);
        }
        .btn-login {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            border: none;
            color: white;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <h3>🔧 管理后台</h3>
            <p class="text-muted">管理员登录</p>
        </div>

        <div id="error-message" class="alert alert-danger d-none"></div>

        <form id="login-form">
            <div class="mb-3">
                <label class="form-label">用户名</label>
                <input type="text" class="form-control" id="username" required placeholder="管理员账号">
            </div>
            <div class="mb-3">
                <label class="form-label">密码</label>
                <input type="password" class="form-control" id="password" required placeholder="密码">
            </div>
            <button type="submit" class="btn btn-login btn w-100 mb-3">登录</button>
        </form>

        <div class="text-center mt-3">
            <a href="/login" class="text-muted">返回前台</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // 检查角色是否为管理员
                    if (data.role !== 'ADMIN' && data.role !== 'SUPER_ADMIN') {
                        const errorEl = document.getElementById('error-message');
                        errorEl.textContent = '无管理员权限';
                        errorEl.classList.remove('d-none');
                        return;
                    }
                    
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userId', data.userId);
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('role', data.role);
                    
                    window.location.href = '/admin';
                } else {
                    const errorEl = document.getElementById('error-message');
                    errorEl.textContent = data.message || '登录失败';
                    errorEl.classList.remove('d-none');
                }
            } catch (error) {
                const errorEl = document.getElementById('error-message');
                errorEl.textContent = '网络错误';
                errorEl.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
