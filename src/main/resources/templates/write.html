<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>写文章 - 个人博客</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/simplemde@1.11.2/dist/simplemde.min.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; }
        .navbar { background: #2c3e50; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">我的博客</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <div class="card-body">
                <h4 class="mb-4">写文章</h4>
                <div class="mb-3">
                    <label class="form-label">标题</label>
                    <input type="text" id="title" class="form-control" placeholder="请输入文章标题">
                </div>
                <div class="mb-3">
                    <label class="form-label">分类</label>
                    <select id="category" class="form-select">
                        <option value="">请选择分类</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">封面图 URL</label>
                    <input type="text" id="coverImage" class="form-control" placeholder="https://...">
                </div>
                <div class="mb-3">
                    <label class="form-label">摘要</label>
                    <textarea id="summary" class="form-control" rows="2" placeholder="文章摘要"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">内容 (Markdown)</label>
                    <textarea id="content" class="form-control" rows="15" placeholder="使用 Markdown 写作..."></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">状态</label>
                    <select id="status" class="form-select">
                        <option value="DRAFT">草稿</option>
                        <option value="PUBLISHED">发布</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="saveArticle()">保存文章</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Load categories
        fetch('/api/categories')
            .then(res => res.json())
            .then(categories => {
                const select = document.getElementById('category');
                categories.forEach(cat => {
                    select.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
                });
            });

        // Save article
        function saveArticle() {
            const data = {
                title: document.getElementById('title').value,
                content: document.getElementById('content').value,
                summary: document.getElementById('summary').value,
                coverImage: document.getElementById('coverImage').value,
                categoryId: parseInt(document.getElementById('category').value) || null,
                status: document.getElementById('status').value
            };

            if (!data.title || !data.content) {
                return alert('请填写标题和内容');
            }

            fetch('/api/articles?authorId=1', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(article => {
                alert('保存成功！');
                window.location.href = '/article?id=' + article.id;
            })
            .catch(err => alert('保存失败: ' + err));
        }
    </script>
</body>
</html>
